<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    </div>
    <div>

            <label class="label">

            </label>
            <label class="label">
                <input type="radio" name= "prioridade" value="medio">Médio
            </label>
            <label class="label">
                <input type="radio" name= "prioridade" value="baixo">Baixo
            </label>
        </div>
    </div>
    <br>
    <br>
    <br>
    <div class="parte2">
        <button id="todas">Todas</button>
        <button id="pendentes">Pendentes</button>
        <button id="concluidas">Concluídas</button>
        <br>
        <br>
        <br>
        <p class="linha"></p>
    </div>
    <h2></h2>
    <div class="parte3">
        <!--aqui dentro vai aparecer a lista de tarefas-->
        <div id="listahtml" class="listahtml">
        </div>
    </div>
    <br>
    <br>
    <div id="calendario">

    </div>
