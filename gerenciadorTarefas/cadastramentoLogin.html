    <div class="boxcontainerlogin">
        <div class="login-container">
            <div>
                <h2>Crie sua conta</h2>
            </div>
            <form class="login-form">
                <input id="login" type="text" placeholder="Login" required name="login">
                <input id="email" type="email" placeholder="Email" required name="email">
                <input id="password" type="password" placeholder="Password" required name="password">
                <input id="confirmPassword" type="password" placeholder="Confirm Password" required name="confirmPassword">
                <button id="criarconta" type="submit">Criar Conta</button>  
                <p id="resposta"></p>
            </form>
        </div>
