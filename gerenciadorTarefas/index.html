<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="gerenciador.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gerenciadortarefas</title>
  </head>
  <body>
    <header class="titulocontainer">
        <h1>Controle de Tarefas</h1>
    </header>
    <div class="parte1">
        <input placeholder="Digite uma nova tarefa" class="input" id="input">
        <input type="date" class="data" id="data">
        <button class="buttonadicionar" id="buttonadicionar">Adicionar</button>
        <br>
    </div>
    <div>
        <h2>Prioridade</h2>
        <div class="prioridade">
            <label class="label">
                <input type="radio" name= "prioridade" value="alto">Alto
            </label>
            <label class="label">
                <input type="radio" name= "prioridade" value="medio">Médio
            </label>
            <label class="label">
                <input type="radio" name= "prioridade" value="baixo">Baixo
            </label>
        </div>
    </div>
    <br>
    <br>
    <br>
    <div class="parte2">
        <button id="todas">Todas</button>
        <button id="pendentes">Pendentes</button>
        <button id="concluidas">Concluídas</button>
        <p class="linha"></p>
    </div>
    <h2></h2>
    <div class="parte3">
        <div id="listahtml" class="listahtml">
        </div>
    </div>
    <div id="calendario">

    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
